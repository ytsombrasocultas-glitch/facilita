<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facilita Veículos · Acesso ao Painel</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080a09; --bg2:#0d100e; --panel:#111512; --panel2:#171c18;
    --line:#222a24; --line2:#2c352e; --txt:#eef3ef; --muted:#8a978d; --muted2:#5f6b62;
    --brand:#5ce635; --brand-bright:#82f55c; --brand-deep:#2c9418; --brand-glow:rgba(92,230,53,.45); --danger:#ff5a52;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--txt);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
    background:
      radial-gradient(800px 460px at 50% -10%, rgba(92,230,53,.14), transparent 60%),
      radial-gradient(600px 500px at 90% 100%, rgba(92,230,53,.06), transparent 55%),
      var(--bg);
  }
  h1,h2,.display{font-family:'Space Grotesk','Inter',sans-serif;letter-spacing:-.4px;}

  .card{
    width:100%;max-width:400px;background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:22px;padding:40px 34px;position:relative;
    box-shadow:0 30px 70px -30px rgba(0,0,0,.85);
  }
  .card::after{content:"";position:absolute;inset:0;border-radius:22px;border:1px solid rgba(92,230,53,.14);pointer-events:none;}

  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:30px;}
  .logo-ring{
    width:64px;height:64px;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 1.5px rgba(92,230,53,.55),0 0 26px -2px var(--brand-glow);margin-bottom:18px;
  }
  .logo-ring svg{width:34px;height:34px;filter:drop-shadow(0 0 7px rgba(92,230,53,.6));}
  .brand h1{font-size:20px;font-weight:700;}
  .brand h1 b{color:var(--brand);}
  .brand .sub{font-size:13px;color:var(--muted);margin-top:5px;}

  form{display:flex;flex-direction:column;gap:16px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;}
  .input-wrap{position:relative;}
  .input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted2);}
  input{
    width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:11px;
    padding:13px 14px 13px 42px;font-size:14.5px;font-family:inherit;font-weight:500;transition:.15s;
  }
  input::placeholder{color:var(--muted2);font-weight:400;}
  input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(92,230,53,.12);}

  .btn{
    margin-top:6px;width:100%;background:var(--brand);color:#06210a;font-family:'Space Grotesk';font-weight:700;
    font-size:15px;padding:14px;border:none;border-radius:12px;cursor:pointer;transition:.18s;
    display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .btn svg{width:18px;height:18px;}
  .btn:hover{background:var(--brand-bright);box-shadow:0 10px 30px -8px var(--brand-glow);transform:translateY(-2px);}
  .btn:active{transform:none;}

  .erro{
    display:none;background:rgba(255,90,82,.1);border:1px solid rgba(255,90,82,.35);color:#ff7b74;
    font-size:13px;font-weight:500;padding:11px 14px;border-radius:11px;text-align:center;
  }
  .erro.show{display:block;}

  .foot{text-align:center;margin-top:22px;font-size:12px;color:var(--muted2);}
  .foot a{color:var(--muted);text-decoration:none;}
  .foot a:hover{color:var(--brand);}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo-ring">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M40 16 H84 L72.5 37 H49 L45 45 H66 L55.5 64 H34 L23.5 84 H11 Z" fill="#5ce635"/></svg>
      </div>
      <h1>Facilita <b>Veículos</b></h1>
      <div class="sub">Acesso ao painel de gestão</div>
    </div>

    <div class="erro" id="erro">Usuário ou senha incorretos. Tente novamente.</div>

    <form method="POST" action="/login" autocomplete="off">
      <div class="field">
        <label for="usuario">Usuário</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="usuario" name="usuario" type="text" placeholder="Seu usuário" required autofocus>
        </div>
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input id="senha" name="senha" type="password" placeholder="Sua senha" required>
        </div>
      </div>
      <button class="btn" type="submit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
        Entrar
      </button>
    </form>

    <div class="foot"><a href="/">← Voltar ao site</a></div>
  </div>

<script>
  // mostra erro se veio redirecionado com ?erro=1
  if(new URLSearchParams(location.search).get('erro')==='1'){
    document.getElementById('erro').classList.add('show');
  }
</script>
</body>
</html>
